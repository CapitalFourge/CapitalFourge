spring:
  application:
    name: portfolio-manager

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:finsight_db}?sslmode=require&preferQueryMode=simple&prepareThreshold=0
    username: ${DB_USER:user}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      connection-timeout: 20000
      data-source-properties:
        cachePrepStmts: false
        prepStmtCacheSize: 0
        prepStmtCacheSqlLimit: 0
        # Disable prepared statement caching at driver level
        prepareThreshold: 0
        useServerPrepStmts: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  redis:
    url: ${SPRING_REDIS_URL}
    ssl:
      enabled: true
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
      shutdown-timeout: 100ms
    # Upstash-specific: trust all certificates (Upstash uses self-signed in some regions)
    client-type: lettuce

  graphql:
    graphiql:
      enabled: false

  data-collector:
    api-key: ${DATA_COLLECTOR_API_KEY:internal-service-key}
    base-url: ${DATA_COLLECTOR_BASE_URL:http://data-collector:8000}

  jwt:
    secret: "f2c3b4a5d6e7f8g9h0i1j2k3l4m5n6o7p8q9r0s1t2u3v4w5x6y7z8a9b0c1d2e3"
    issuer: "capital-fourge"
    access-expiration-ms: 86400000
    refresh-expiration-ms: 604800000

# gRPC disabled - we use REST to data-collector now
grpc:
  server:
    enabled: false
    port: -1

server:
  port: ${PORT:10000}
  address: 0.0.0.0

# Health check on main server (same port as app)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,caches
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
    redis:
      enabled: false  # Disable ALL Redis health checks (reactive bug + keep it simple)
    caches:
      enabled: true