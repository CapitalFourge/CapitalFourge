spring:
  application:
    name: portfolio-manager

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  redis:
    url: ${SPRING_REDIS_URL}

  graphql:
    graphiql:
      enabled: false

  data-collector:
    api-key: ${DATA_COLLECTOR_API_KEY:internal-service-key}

  jwt:
    secret: "f2c3b4a5d6e7f8g9h0i1j2k3l4m5n6o7p8q9r0s1t2u3v4w5x6y7z8a9b0c1d2e3"
    issuer: "capital-fourge"
    access-expiration-ms: 3600000
    refresh-expiration-ms: 604800000

# gRPC client config (correct prefix for grpc-spring-boot-starter 2.15.x)
grpc:
  client:
    data-collector:
      address: 'static://${GRPC_DATA_COLLECTOR_HOST:localhost}:${GRPC_DATA_COLLECTOR_PORT:50051}'
      negotiation-type: ${GRPC_NEGOTIATION_TYPE:plaintext}
  # Completely disable gRPC server - ROOT LEVEL, not under spring:
  server:
    enabled: false
    port: -1

server:
  port: ${PORT:10000}
  address: 0.0.0.0

management:
  server:
    port: ${PORT:10000}
    address: 0.0.0.0
  endpoints:
    web:
      exposure:
        include: health
      base-path: /
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
