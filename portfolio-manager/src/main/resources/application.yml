spring:
  application:
    name: portfolio-manager

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  redis:
    url: ${SPRING_REDIS_URL}
    ssl:
      enabled: true
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
      shutdown-timeout: 100ms

  graphql:
    graphiql:
      enabled: false

  data-collector:
    api-key: ${DATA_COLLECTOR_API_KEY:internal-service-key}
    base-url: ${DATA_COLLECTOR_BASE_URL:http://data-collector:8000}

  jwt:
    secret: "f2c3b4a5d6e7f8g9h0i1j2k3l4m5n6o7p8q9r0s1t2u3v4w5x6y7z8a9b0c1d2e3"
    issuer: "capital-fourge"
    access-expiration-ms: 3600000
    refresh-expiration-ms: 604800000

# gRPC disabled - we use REST to data-collector now
grpc:
  server:
    enabled: false
    port: -1

server:
  port: ${PORT:10000}
  address: 0.0.0.0

# Health check on main server (same port as app)
management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
    redis:
      enabled: true
      reactive:
        enabled: false  # Disable reactive health check (bug: ignores spring.redis.url)